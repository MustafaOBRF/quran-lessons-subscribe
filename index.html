<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الاشتراك في دُرُوسِ القُرْآنِ اليَوْمِيَّة</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #faf7f2;
    --card: #ffffff;
    --text: #1a1a1a;
    --accent: #0f6b4f;
    --border: #e2ddd3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14201c;
      --card: #1c2b25;
      --text: #f0ede6;
      --accent: #4fd3a3;
      --border: #2d3d36;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: 'Traditional Arabic', 'Amiri', 'Segoe UI', Tahoma, sans-serif;
    padding: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 460px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 8px;
    color: var(--accent);
  }
  p.desc {
    font-size: 0.95rem;
    line-height: 1.8;
    opacity: 0.85;
    margin: 0 0 24px;
  }
  label {
    display: block;
    text-align: right;
    font-size: 0.9rem;
    margin: 16px 0 6px;
  }
  input[type="text"], input[type="email"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 1rem;
  }
  /* Honeypot field: hidden from real users, only bots tend to fill it in */
  .hp-field {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    overflow: hidden;
  }
  button {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #06231a;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  #message {
    margin-top: 18px;
    font-size: 0.95rem;
    min-height: 1.2em;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>دُرُوسُ القُرْآنِ اليَوْمِيَّة</h1>
    <p class="desc">
      اشترك لتصلك يوميًا رسالة تحتوي على درس قرآني قصير: الآيات، شرح مختصر،
      حديث نبوي، قصة للأطفال، وحقيقة تاريخية ممتعة.
    </p>
    <form id="subscribe-form">
      <label for="name">الاسم</label>
      <input type="text" id="name" name="name" required>

      <label for="email">البريد الإلكتروني</label>
      <input type="email" id="email" name="email" required>

      <div class="hp-field" aria-hidden="true">
        <label for="website">Website</label>
        <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
      </div>

      <button type="submit" id="submit-btn">اشترك الآن</button>
      <div id="message"></div>
    </form>
  </div>

  <script>
    // Apps Script Web App /exec endpoint that appends the signup to the Google Sheet.
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyasKtmrjCviSwl1fLFevWH9e6Ihr3Fcwg0ZlGUclG42st24JYqFkQ3HBXWxV-aGh1Q/exec';

    var form = document.getElementById('subscribe-form');
    var button = document.getElementById('submit-btn');
    var message = document.getElementById('message');

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      button.disabled = true;
      message.textContent = '...جارِ الاشتراك';

      var formData = new FormData(form);

      // mode: 'no-cors' means we can't read the Apps Script response body,
      // so we optimistically confirm once the request has been sent.
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: formData
      }).then(function () {
        message.textContent = '.تم الاشتراك بنجاح! تحقق من بريدك الإلكتروني غدًا';
        form.reset();
        button.disabled = false;
      }).catch(function () {
        message.textContent = '.حدث خطأ، حاول مرة أخرى لاحقًا';
        button.disabled = false;
      });
    });
  </script>
</body>
</html>
